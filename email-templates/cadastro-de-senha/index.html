<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>Cadastro de senha - Nexus</title>
<!--[if mso]>
<noscript>
  <xml>
    <o:OfficeDocumentSettings>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
</noscript>
<![endif]-->
<style>
  body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { -ms-interpolation-mode: bicubic; border: 0; line-height: 100%; outline: none; text-decoration: none; }
  body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; background-color: #e7ebee; }

  @media only screen and (max-width: 640px) {
    .email-container { width: 100% !important; }
    .content-padding { padding-left: 20px !important; padding-right: 20px !important; }
    .title-text { font-size: 28px !important; }
    .greeting-text { font-size: 20px !important; }
    .signoff-table { width: 100% !important; }
    .signoff-cell { text-align: left !important; }
  }
</style>
</head>
<body style="margin:0; padding:0; background-color:#e7ebee;">
  <!-- Preheader (hidden preview text) -->
  <div style="display:none; max-height:0; overflow:hidden; mso-hide:all;">
    Seja bem-vindo(a) ao Nexus! Defina sua senha de acesso para concluir o cadastro.
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e7ebee;">
    <tr>
      <td align="center" style="padding: 32px 16px;">

        <table role="presentation" class="email-container" width="640" cellpadding="0" cellspacing="0" border="0" style="width:640px; max-width:640px; background-color:#ffffff; border-radius:8px; overflow:hidden;">

          <!-- Header banner (flattened image: logo + tagline + illustration) -->
          <tr>
            <td style="padding:0;">
              <img src="assets/header-banner.png" width="640" height="180" alt="Nexus sempre cuidando da sua equipe" style="display:block; width:100%; height:auto; border:0;" />
            </td>
          </tr>

          <!-- Content card -->
          <tr>
            <td class="content-padding" style="padding: 24px 10px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f5f5f5; border-radius:8px;">
                <tr>
                  <td style="padding: 24px;">

                    <!-- Title -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td class="title-text" style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:36px; font-weight:600; color:#1e293b; line-height:1.25; padding-bottom:16px;">
                          Cadastro de senha
                        </td>
                      </tr>
                      <tr>
                        <td class="greeting-text" style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:24px; font-weight:600; color:#1e293b; line-height:1.3; padding-bottom:16px;">
                          Olá, <span style="color:#219eaf;">{{NOME_USUARIO}}</span>,
                        </td>
                      </tr>
                      <tr>
                        <td style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:20px; font-weight:400; color:#222935; line-height:1.5;">
                          Seja bem-vindo(a) ao Nexus! Para concluir seu cadastro, defina a senha de acesso à sua conta.
                        </td>
                      </tr>
                    </table>

                    <!-- Divider -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:64px;">
                      <tr>
                        <td style="border-top:1px dashed #cbd5e1; font-size:1px; line-height:1px;">&nbsp;</td>
                      </tr>
                    </table>

                    <!-- CTA lead-in -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:20px; font-weight:400; color:#222935; padding:24px 0;">
                          Use o link abaixo para continuar
                        </td>
                      </tr>
                    </table>

                    <!-- Button (bulletproof pattern, with Outlook VML fallback) -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center">
                          <!--[if mso]>
                          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{LINK_CADASTRO_SENHA}}" style="height:56px;v-text-anchor:middle;width:600px;" arcsize="50%" stroke="f" fillcolor="#008e9e">
                          <w:anchorlock/>
                          <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:24px;font-weight:bold;">Cadastrar senha</center>
                          </v:roundrect>
                          <![endif]-->
                          <!--[if !mso]><!-- -->
                          <a href="{{LINK_CADASTRO_SENHA}}" target="_blank" style="display:block; background-color:#008e9e; color:#ffffff; font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:24px; font-weight:700; line-height:24px; text-align:center; text-decoration:none; border-radius:64px; padding:16px 32px;">
                            Cadastrar senha
                          </a>
                          <!--<![endif]-->
                        </td>
                      </tr>
                    </table>

                    <!-- Divider -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:24px;">
                      <tr>
                        <td style="border-top:1px dashed #cbd5e1; font-size:1px; line-height:1px;">&nbsp;</td>
                      </tr>
                    </table>

                    <!-- Signoff -->
                    <table role="presentation" class="signoff-table" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:24px;">
                      <tr>
                        <td class="signoff-cell" align="right" style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:24px; font-weight:500; color:#282828; padding-bottom:16px;">
                          Atenciosamente,
                        </td>
                      </tr>
                      <tr>
                        <td class="signoff-cell" align="right" style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size:24px; font-weight:500; color:#008e9e;">
                          Equipe Nexus
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="left" style="background-color:#f8fbfa; border-top:1px solid #eeeeee; padding: 24px 24px 24px 34px;">
              <img src="assets/footer-logo.png" width="96" alt="Nexus" style="display:block; width:96px; height:auto; border:0;" />
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>
</body>
</html>
