name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Repo is served at https://tallysorla.github.io/nexus-dashboard/, not
      # at the domain root like the Vercel deploy, so the built asset paths
      # need that subpath baked in. --base only affects this build, not the
      # Vercel one (which calls `vite build` directly with no flag).
      - name: Build (base path = /nexus-dashboard/)
        run: npx vite build --base=/nexus-dashboard/

      # GitHub Pages has no server-side rewrites for client-side routing --
      # the classic fix is serving the same index.html as the 404 response,
      # so wouter can take over and route client-side regardless of which
      # path was requested directly. .nojekyll skips GitHub's Jekyll
      # processing, which isn't needed for a prebuilt static site.
      - name: SPA fallback + disable Jekyll processing
        run: |
          cp dist/public/index.html dist/public/404.html
          touch dist/public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
